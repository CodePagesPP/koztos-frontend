<div class="layout-container">
  <button class="hamburger" (click)="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="sidebar-overlay" [class.active]="isMenuOpen" (click)="closeMenu()"></div>

  <aside class="sidebar" [class.open]="isMenuOpen">
    <div class="brand">
      <div class="finance-logo">
        <img src="assets/logo.png" alt="logo" class="logo-img">
      </div>
    </div>

    <nav class="navigation">
      <a routerLink="dashboard" routerLinkActive="active" class="nav-link" (click)="handleNavLinkClick()">
        Dashboard
      </a>
      <a routerLink="gastos" routerLinkActive="active" class="nav-link" (click)="handleNavLinkClick()">
        Gastos
      </a>
      <div class="nav-item-dropdown">
        <a class="nav-link dropdown-toggle" (click)="toggleSubmenu('config')">
          Configuración
        </a>
        <div class="submenu" [class.show]="activeSubmenu === 'config'">
          <a routerLink="configuracion/usuarios" routerLinkActive="active" class="submenu-link" (click)="handleNavLinkClick()">
            Usuarios
          </a>
          </div>
      </div>
    </nav>

    <footer class="sidebar-footer">
      <button class="btn-logout" (click)="logout()">Cerrar Sesión</button>
    </footer>
  </aside>

  <main class="content-wrapper">
    <router-outlet></router-outlet>
  </main>
</div>
